name: Build NW.js on Windows
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      NWJS_DIR: ${{ github.workspace }}\nwjs
      SRC_DIR: ${{ github.workspace }}\nwjs\src
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
      GYP_DEFINES: "target_arch=x64 building_nw=1 clang=1 icu_use_data_file_flag=1 host_arch=x64 nwjs_sdk=0 disable_nacl=1 buildtype=Official fastbuild=2 is_component_build=false is_debug=false"
      GYP_GENERATORS: "ninja"
      GYP_CHROMIUM_NO_ACTION: 0
      GYP_GENERATOR_FLAGS: "output_dir=out"
      GYP_MSVS_VERSION: "2022"
      GYP_MSVS_OVERRIDE_PATH: "C:\\Program Files\\Microsoft Visual Studio\\2022\\Enterprise"
      NW_VERSION: "nw97"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set-up Python 2.x
        uses: LizardByte/actions/actions/setup_python@master
        with:
          python-version: '2.7'

      - name: Install Windows 11 SDK
        run: >
            Start-Process -wait -FilePath "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vs_installer.exe"
            -ArgumentList "modify", "--installPath", """C:\Program Files\Microsoft Visual Studio\2022\Enterprise""",
            "--quiet", "--norestart", "--nocache",
            "--add", "Microsoft.VisualStudio.Component.Windows11SDK.22621",
            "--add", "Microsoft.VisualStudio.Component.Windows11SDK.26100"
            -Verb RunAs

      - name: Set Global Git Configs
        shell: pwsh
        run: |
            git config --global depot-tools.allowGlobalGitConfig true

      - name: Install Depot Tools
        uses: newkdev/setup-depot-tools@v1.0.1

      - name: Cache LLVM install
        uses: actions/cache/restore@v5
        id: cache-llvm
        with:
          path: "C:\\Program Files\\LLVM"
          key: cache-llvm

      - name: Install LLVM
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: choco install llvm

      - name: Add clang-cl to PATH
        run: echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Save LLVM install
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: "C:\\Program Files\\LLVM"
          key: cache-llvm

      - name: Restore
        id: cache
        uses: actions/cache/restore@v5
        with:
          path: |
            ${{ env.NWJS_DIR }}
          key: ${{ env.NW_VERSION }}-src

      - name: Initialize NW.js source directory
        if: steps.cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ${{ env.NWJS_DIR }} -Force | Out-Null
          cd ${{ env.NWJS_DIR }}
          gclient config --name=src https://github.com/nwjs/chromium.src.git@origin/${{env.NW_VERSION}}

          $gclientContent = Get-Content .gclient -Raw
          $updatedContent = $gclientContent -replace '"custom_deps" : \{[^}]+\}', @"
          "custom_deps" : {
            "src/third_party/WebKit/LayoutTests": None,
            "src/chrome_frame/tools/test/reference_build/chrome": None,
            "src/chrome_frame/tools/test/reference_build/chrome_win": None,
            "src/chrome/tools/test/reference_build/chrome": None,
            "src/chrome/tools/test/reference_build/chrome_linux": None,
            "src/chrome/tools/test/reference_build/chrome_mac": None,
            "src/chrome/tools/test/reference_build/chrome_win": None,
          }
          "@
          $updatedContent | Set-Content .gclient -Encoding utf8

      - name: Clone NW.js dependent repos
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          New-Item -ItemType Directory -Path ${{ env.SRC_DIR }} -Force | Out-Null
          git clone -b ${{env.NW_VERSION}} --depth 1 --recursive https://github.com/nwjs/nw.js.git ${{ env.SRC_DIR }}/content/nw
          git clone -b ${{env.NW_VERSION}} --depth 1 --recursive https://github.com/nwjs/node.git ${{ env.SRC_DIR }}/third_party/node-nw
          git clone -b ${{env.NW_VERSION}} --depth 1 --recursive https://github.com/nwjs/v8.git ${{ env.SRC_DIR }}/v8

      - name: Sync source code with gclient
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          cd ${{ env.NWJS_DIR }}
          gclient sync --no-history

      - name: Save
        uses: actions/cache/save@v5
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          path: |
            ${{ env.NWJS_DIR }}
          key: ${{ env.NW_VERSION }}-src

      - name: Generate GN build files for Chromium
        run: |
          cd ${{ env.SRC_DIR }}
          $currentUnixTimestamp = [Math]::Floor((Get-Date -Date (Get-Date).ToUniversalTime() -UFormat %s))
          Set-Content -Path "build\util\LASTCHANGE.committime" -Value $currentUnixTimestamp
          "LASTCHANGE=0000000000000000000000000000000000000000",
          "LASTCHANGE_YEAR=2026" | Set-Content "build\util\LASTCHANGE"

          gn gen out/nw --args="is_component_build=false is_debug=false symbol_level=0 blink_symbol_level=0 v8_symbol_level=0 is_component_ffmpeg=true"

      - name: Generate GYP build files for Node
        run: |
          cd ${{ env.SRC_DIR }}
          python3 third_party/node-nw/tools/gyp/gyp_main.py -I third_party/node-nw/common.gypi -D build_type=Release_x64 third_party/node-nw/node.gyp

      # - name: Build NW.js core
      #   run: |
      #     cd ${{ env.SRC_DIR }}
      #     autoninja -C out/nw -j8 nwjs

      - name: Build Node library
        run: |
          cd ${{ env.SRC_DIR }}
          autoninja -C out/Release -j8 node

      - name: Copy Node library to NW.js
        run: |
          cd ${{ env.SRC_DIR }}
          autoninja -C out/nw copy_node

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nwjs-windows-x64
          path: |
            ${{ env.SRC_DIR }}/out

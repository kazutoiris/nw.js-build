            "--quiet", "--norestart", "--nocache"
            -Verb RunAs

      - name: Set Global Git Configs
        shell: pwsh
        run: |
            git config --global depot-tools.allowGlobalGitConfig true

      - name: Install Depot Tools
        uses: newkdev/setup-depot-tools@v1.0.1

      - uses: actions/download-artifact@v7
        with:
          name: build-cache

      - name: Decompress artifacts
        shell: cmd
        run: |
          mkdir nwjs
          "C:\Program Files\Git\usr\bin\tar.exe" -xf artifact.tzst -P -C ${{ env.NWJS_DIR }} --force-local --use-compress-program "zstd -d"
          del artifact.tzst

      - name: Build NW.js core
        working-directory: ${{ env.SRC_DIR }}
        id: run-build
        run: |
          python3 ${{ github.workspace }}/build.py

      - name: Compress artifacts
        shell: cmd
        run:  |
            "C:\Program Files\Git\usr\bin\tar.exe" --posix -cf artifact.tzst --exclude artifact.tzst -P -C ${{ env.NWJS_DIR}} --force-local --use-compress-program "zstd -T0" .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-cache
          overwrite: true
          path: artifact.tzst

      - uses: actions/upload-artifact@v6
        if: ${{ steps.run-build.outputs.finish == 'true' }}
        with:
          name: my-artifact
          path: ${{ env.SRC_DIR }}/out



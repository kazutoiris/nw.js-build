      GYP_MSVS_VERSION: "2022"
      GYP_MSVS_OVERRIDE_PATH: "C:\\Program Files\\Microsoft Visual Studio\\2022\\Enterprise"
      NW_VERSION: "nw97"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set-up Python 2.x
        uses: LizardByte/actions/actions/setup_python@master
        with:
